<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易日誌 · Trading Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  color-scheme:light;
  --bg:#f6f7f9;
  --surface:#ffffff;
  --surface-2:#f5f6f8;
  --surface-3:#eaecf1;
  --border:#e9ebf0;
  --border-soft:#f0f1f5;
  --text:#0f1729;
  --text-2:#667085;
  --text-3:#98a2b3;
  --primary:#6355ff;
  --primary-2:#5446f0;
  --primary-soft:rgba(99,85,255,.10);
  --primary-soft-2:rgba(99,85,255,.18);
  --green:#16b883;
  --green-soft:rgba(22,184,131,.12);
  --red:#f0455a;
  --red-soft:rgba(240,69,90,.12);
  --blue:#3b82f6;
  --blue-soft:rgba(59,130,246,.14);
  --amber:#f5a524;
  --grey:#98a2b3;
  --radius:16px;
  --radius-sm:11px;
  --shadow:0 1px 2px rgba(16,24,40,.05), 0 1px 3px rgba(16,24,40,.05);
  --shadow-h:0 8px 22px rgba(16,24,40,.09);
  --sans:'Inter','Noto Sans TC',-apple-system,system-ui,'Segoe UI',sans-serif;
  --scroll-thumb:#d6dae4;--scroll-thumb-h:#c2c8d6;
  --tooltip-bg:#0f1729;--tooltip-fg:#ffffff;
  --guide:rgba(16,24,40,.18);--marker-shadow:rgba(16,24,40,.28);
  --overlay:rgba(16,24,40,.45);--modal-shadow:0 24px 60px rgba(16,24,40,.28);
  --toast-bg:#0f1729;--toast-fg:#ffffff;
  --cal-win-bg:#eafaf2;--cal-win-bd:#cdeede;
  --cal-loss-bg:#fdecef;--cal-loss-bd:#f7d2da;
  --cal-be-bg:#f1f4f8;--cal-be-bd:#e3e7ee;
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0b0d13;
  --surface:#151922;
  --surface-2:#1c212c;
  --surface-3:#262c39;
  --border:#262b37;
  --border-soft:#1b202a;
  --text:#eaecf1;
  --text-2:#98a2b3;
  --text-3:#5f6978;
  --primary:#7d6cff;
  --primary-2:#6b5af2;
  --primary-soft:rgba(125,108,255,.14);
  --primary-soft-2:rgba(125,108,255,.24);
  --green:#22d39a;
  --green-soft:rgba(34,211,154,.14);
  --red:#ff5269;
  --red-soft:rgba(255,82,105,.14);
  --blue:#4d96ff;
  --blue-soft:rgba(77,150,255,.16);
  --amber:#f7b53b;
  --grey:#5f6978;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
  --shadow-h:0 12px 30px rgba(0,0,0,.5);
  --scroll-thumb:#2b313d;--scroll-thumb-h:#39404e;
  --tooltip-bg:#05070c;--tooltip-fg:#eaecf1;
  --guide:rgba(255,255,255,.16);--marker-shadow:rgba(0,0,0,.55);
  --overlay:rgba(2,4,8,.66);--modal-shadow:0 24px 60px rgba(0,0,0,.7);
  --toast-bg:#eef0f4;--toast-fg:#0b0d13;
  --cal-win-bg:rgba(34,211,154,.10);--cal-win-bd:rgba(34,211,154,.30);
  --cal-loss-bg:rgba(255,82,105,.10);--cal-loss-bd:rgba(255,82,105,.28);
  --cal-be-bg:var(--surface-2);--cal-be-bd:var(--border);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--sans);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:20px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--scroll-thumb-h)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.pos{color:var(--green)}
.neg{color:var(--red)}

/* ===== Layout ===== */
#app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.rail{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 0;position:sticky;top:0;height:100vh;z-index:21}
.rail-logo{width:40px;height:40px;border-radius:10px;position:relative;flex:none;margin-bottom:12px;display:grid;place-items:center;background:transparent;box-shadow:none}
.rail-logo::after{display:none}
.rail-logo .rl-img{width:100%;height:100%;object-fit:contain;display:block}
.rail-logo svg{width:23px;height:23px;position:relative;z-index:1;display:block}
.rail-item{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--text-3);cursor:pointer;transition:.14s}
.rail-item svg{width:21px;height:21px}
.rail-item:hover{background:var(--surface-2);color:var(--text-2)}
.rail-item.active{background:var(--primary-soft);color:var(--primary)}
.rail-sp{flex:1}
.rail-ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(140deg,#f5a524,#ef6f4d);display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
.sidebar{
  border-right:1px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;gap:4px;padding:20px 14px;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
.brand-logo{width:34px;height:34px;object-fit:contain;display:block;flex:none}
.auth-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,.16);padding:42px 34px;width:min(380px,92vw);display:flex;flex-direction:column;align-items:center;text-align:center}
.auth-logo{width:64px;height:64px;object-fit:contain;margin-bottom:14px}
.auth-title{font-size:24px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.auth-sub{font-size:13.5px;color:var(--text-3);margin:7px 0 26px;font-weight:600;max-width:280px}
.gbtn-wrap{min-height:42px;display:flex;justify-content:center;align-items:center}
.g-signin{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:999px;padding:11px 22px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.08);transition:.15s}
.g-signin:hover{background:#f7f8f8;box-shadow:0 1px 3px rgba(0,0,0,.16)}
.g-signin:active{background:#f1f3f4}
.g-signin svg{flex:none}
.auth-guest{margin-top:14px;background:transparent;border:1px solid var(--border);color:var(--text-2);border-radius:999px;padding:9px 18px;font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer}
.auth-guest:hover{background:var(--surface-2);color:var(--text)}
.auth-note{margin-top:16px;font-size:12px;color:var(--text-3);line-height:1.55;max-width:300px}
.user-chip{display:none;align-items:center;gap:9px;margin-top:8px;padding:8px;border-radius:12px;background:var(--surface-2)}
.uc-ava{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none}
.uc-ava.uc-ph{display:grid;place-items:center;background:linear-gradient(140deg,#f5a524,#ef6f4d);color:#fff;font-weight:800;font-size:12px}
.uc-meta{min-width:0;flex:1;text-align:left}
.uc-name{font-size:12.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-mail{font-size:10.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-logout{flex:none;width:28px;height:28px;border:none;background:transparent;color:var(--text-3);cursor:pointer;border-radius:8px;display:grid;place-items:center}
.uc-logout:hover{background:var(--surface);color:var(--red)}
.uc-logout svg{width:16px;height:16px}
.logo{
  width:38px;height:38px;border-radius:11px;flex:none;
  background:linear-gradient(140deg,var(--primary),#8b7bff);
  display:grid;place-items:center;box-shadow:0 6px 16px rgba(99,85,255,.32);
}
.logo svg{width:20px;height:20px}
.brand .name{font-weight:800;font-size:16px;letter-spacing:-.4px;line-height:1.1}
.brand .sub{font-size:10px;color:var(--text-3);letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
.side-add{width:100%;justify-content:center;margin-bottom:10px}
.nav-label{font-size:10px;color:var(--text-3);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;padding:8px 10px 4px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--radius-sm);
  color:var(--text-2);font-weight:600;font-size:14px;cursor:pointer;transition:.15s;user-select:none;
}
.nav-item svg{width:19px;height:19px;flex:none}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--primary-soft);color:var(--primary)}
.nav-new{margin-left:auto;background:var(--primary-soft-2);color:var(--primary);font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.6px;line-height:1.5}
.nav-sep{height:1px;background:var(--border);margin:11px 6px}
.nb-doc{width:100%;min-height:440px;border:none;outline:none;background:transparent;color:var(--text);font-family:var(--sans);font-size:14.5px;line-height:1.7;resize:vertical}
.nb-doc::placeholder{color:var(--text-3)}
.nb-search-bar{margin-bottom:14px}
.nb-search{position:relative;max-width:520px}
.nb-search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--text-3)}
.nb-search input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);font-family:var(--sans);font-size:14px;outline:none;box-sizing:border-box}
.nb-search input:focus{border-color:var(--primary)}
.nb-layout{display:grid;grid-template-columns:200px 270px 1fr;gap:14px;align-items:start}
.nb-col{min-width:0}
.nb-folders{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
.nb-addf{display:flex;align-items:center;gap:7px;width:100%;background:none;border:1px dashed var(--border);color:var(--text-2);padding:9px 11px;border-radius:10px;font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer;margin-bottom:10px}
.nb-addf:hover{color:var(--primary);border-color:var(--primary)}
.nb-addf svg{width:15px;height:15px}
.nb-flabel{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);font-weight:800;padding:4px 6px}
.nb-folder{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;color:var(--text-2);font-weight:600;font-size:13.5px}
.nb-folder:hover{background:var(--surface-2);color:var(--text)}
.nb-folder.active{background:var(--primary-soft);color:var(--primary)}
.nb-folder svg{width:17px;height:17px;flex:none}
.nb-fname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nb-fc{font-size:11px;color:var(--text-3);font-weight:700}
.nb-new{display:flex;align-items:center;gap:7px;justify-content:center;background:var(--primary);color:#fff;border:none;padding:10px 12px;border-radius:11px;font-family:var(--sans);font-weight:700;font-size:13.5px;cursor:pointer;margin-bottom:10px;width:100%}
.nb-new:hover{background:var(--primary-2)}
.nb-new svg{width:16px;height:16px}
.nb-items{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.nb-item{padding:12px 14px;border-bottom:1px solid var(--border-soft);cursor:pointer}
.nb-item:last-child{border-bottom:none}
.nb-item:hover{background:var(--surface-2)}
.nb-item.active{background:var(--primary-soft)}
.nb-it-title{font-weight:700;font-size:13.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.nb-it-sub{font-size:11.5px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb-empty-list{padding:24px 14px;text-align:center;color:var(--text-3);font-size:13px}
.nb-noselect{color:var(--text-3);font-size:14px}
.nb-ed-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.nb-title-in{flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--text);font-family:var(--sans);font-size:19px;font-weight:800;padding:2px 0}
.nb-title-in::placeholder{color:var(--text-3)}
.nb-fsel{border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-2);font-family:var(--sans);font-size:12.5px;font-weight:700;padding:6px 8px;cursor:pointer}
.nb-meta{font-size:11.5px;color:var(--text-3);font-weight:600;margin-bottom:12px}
.nb-dtitle{font-size:19px;font-weight:800;color:var(--text)}
.nb-dbadge{font-size:10.5px;font-weight:800;letter-spacing:.4px;color:var(--primary);background:var(--primary-soft);padding:3px 9px;border-radius:999px;text-transform:uppercase}
.nb-today{font-size:10px;font-weight:800;color:var(--green);background:color-mix(in srgb,var(--green) 16%,transparent);padding:1px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
.rep-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:980px){.rep-charts{grid-template-columns:1fr}}
.rep-daypill{font-size:11px;font-weight:700;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:3px 11px;border-radius:999px}
.rep-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:2px 18px;margin-top:4px}
.rep-cell{padding:13px 2px;border-bottom:1px solid var(--border-soft)}
.rep-cell .rc-l{font-size:11.5px;color:var(--text-3);font-weight:600;margin-bottom:5px}
.rep-cell .rc-v{font-size:19px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
@media(max-width:860px){.rep-summary{grid-template-columns:repeat(2,1fr);gap:2px 14px}}
@media(max-width:480px){.rep-cell .rc-v{font-size:17px}}
.prog-top{display:grid;grid-template-columns:minmax(210px,.85fr) minmax(280px,1.1fr) minmax(300px,1.45fr);gap:16px;align-items:start}
@media(max-width:1100px){.prog-top{grid-template-columns:1fr 1fr}}
@media(max-width:720px){.prog-top{grid-template-columns:1fr}}
.prog-col{display:flex;flex-direction:column;gap:16px}
.prog-mini{padding:16px 18px}
.prog-mini .sc-top{font-size:12px;color:var(--text-3);font-weight:600}
.prog-mini .sc-big{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:5px}
.prog-bar{height:7px;background:var(--surface-3);border-radius:99px;margin-top:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:99px}
.prog-checklist{display:flex;flex-direction:column}
.rule-cat{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--text-3);font-weight:800;margin:-2px 0 8px}
.rule-list{flex:1}
.rule-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-soft)}
.rule-row:last-child{border-bottom:none}
.rule-l{display:flex;align-items:center;gap:11px;min-width:0}
.rule-nm{font-size:13.5px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-st{font-size:12.5px;font-weight:700;color:var(--text-3);flex:none}
.rule-ic{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:800;flex:none}
.rule-ic.ok{background:color-mix(in srgb,var(--green) 16%,transparent);color:var(--green)}
.rule-ic.bad{background:color-mix(in srgb,var(--red) 16%,transparent);color:var(--red)}
.rule-ic.pend{border:1.5px solid var(--border);background:var(--surface-2)}
.rule-chk{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface-2);cursor:pointer;flex:none;position:relative;padding:0}
.rule-chk.on{background:var(--primary);border-color:var(--primary)}
.rule-chk.on:after{content:'';position:absolute;left:7px;top:3px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.prog-viewday{width:100%;margin-top:14px;justify-content:center}
.rule-edit-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-family:var(--sans);font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:9px;cursor:pointer}
.rule-edit-btn:hover{color:var(--primary);border-color:var(--primary)}
.rule-edit-btn svg{width:15px;height:15px}
.rules-tbl-wrap{overflow-x:auto;margin:2px -2px 0}
.rules-tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.rules-tbl th{text-align:left;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-3);font-weight:800;padding:8px 14px 8px 0;border-bottom:1px solid var(--border)}
.rules-tbl td{padding:13px 14px 13px 0;border-bottom:1px solid var(--border-soft);font-weight:600;color:var(--text-2);white-space:nowrap}
.rules-tbl td.rt-name{color:var(--text);font-weight:700}
.rules-tbl tr:last-child td{border-bottom:none}
.rule-edit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.rule-edit-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:11px 14px}
.rer-name{font-size:13.5px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rer-type{font-size:11.5px;color:var(--text-3);font-weight:600;margin-top:2px}
.rer-del{background:none;border:none;color:var(--text-3);cursor:pointer;flex:none;padding:4px;border-radius:7px}
.rer-del:hover{color:var(--red);background:color-mix(in srgb,var(--red) 12%,transparent)}
.rule-add-box{border-top:1px solid var(--border);padding-top:14px}
.rule-add-h{font-size:12px;font-weight:800;color:var(--text-2);margin-bottom:9px}
.rule-in{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-family:var(--sans);font-size:14px;outline:none;box-sizing:border-box}
.rule-in:focus{border-color:var(--primary)}
.rule-add-row{display:flex;gap:10px;margin-top:9px}
.rule-add-row select.rule-in{flex:1}
.rule-add-row input.rule-in{width:120px;flex:none}
.no-trade-day{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:38px 16px;flex:1}
.ntd-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--surface-2);color:var(--text-3);margin-bottom:12px}
.ntd-ic svg{width:26px;height:26px}
.ntd-t{font-size:15px;font-weight:800;color:var(--text);margin-bottom:5px}
.ntd-s{font-size:12.5px;color:var(--text-3);font-weight:600;max-width:230px}
.ntd-prog{font-size:15px;font-weight:800;color:var(--text-3)}
.prog-datenav{display:flex;align-items:center;gap:5px}
.pdn-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:16px;line-height:1;cursor:pointer;display:grid;place-items:center;padding:0}
.pdn-btn:hover{background:var(--surface-2);color:var(--text)}
.pdn-btn:disabled{opacity:.4;cursor:default}
.pdn-date{height:26px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:inherit;font-size:12px;font-weight:700;padding:0 6px;color-scheme:light}
:root[data-theme="dark"] .pdn-date{color-scheme:dark}
.pdn-date::-webkit-calendar-picker-indicator{cursor:pointer}
.pdn-today{height:26px;border:1px solid var(--primary-soft-2,var(--border));border-radius:8px;background:var(--primary-soft);color:var(--primary);font-size:11.5px;font-weight:800;padding:0 10px;cursor:pointer}
.pdn-today:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
@media(max-width:1080px){.nb-layout{grid-template-columns:1fr}.nb-folders{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.nb-flabel{display:none}.nb-addf{width:auto;margin:0}.nb-folder{padding:7px 11px}}
.sidebar .spacer{flex:1}
.side-action{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--text-3);font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.side-action svg{width:16px;height:16px}
.side-action:hover{background:var(--surface-2);color:var(--text-2)}

.main{min-width:0;padding:22px 28px 60px;max-width:1320px;margin:0 auto;width:100%}

/* ===== Header / topbar ===== */
.dash-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.acct{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 14px;font-weight:700;font-size:14px;box-shadow:var(--shadow)}
.acct-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
.dh-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.range-seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:3px;box-shadow:var(--shadow)}
.range-seg button{border:none;background:transparent;color:var(--text-2);font-family:var(--sans);font-weight:600;font-size:13px;padding:7px 13px;border-radius:8px;cursor:pointer;transition:.14s}
.range-seg button.active{background:var(--primary);color:#fff}
.lang-seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:3px;box-shadow:var(--shadow);flex:none}
.lang-seg button{border:none;background:transparent;color:var(--text-2);font-family:var(--sans);font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.14s;min-width:40px}
.lang-seg button.active{background:var(--primary);color:#fff}
.theme-btn{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);display:grid;place-items:center;cursor:pointer;transition:.15s;box-shadow:var(--shadow);flex:none}
.theme-btn:hover{color:var(--primary);border-color:var(--primary)}
.theme-btn svg{width:18px;height:18px}
.tb-right{display:flex;align-items:center;gap:10px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.6px}
.page-sub{color:var(--text-2);font-size:13.5px;margin-top:3px;font-weight:500}
.btn{font-family:var(--sans);font-weight:700;font-size:13.5px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:10px 16px;border-radius:11px;transition:.15s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(99,85,255,.28)}
.btn-primary:hover{background:var(--primary-2);transform:translateY(-1px);box-shadow:0 7px 18px rgba(99,85,255,.34)}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}

/* ===== Cards ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-h .t{font-weight:700;font-size:15px;letter-spacing:-.2px}
.card-h .meta{font-size:11px;color:var(--text-3);font-weight:600}

/* ===== Stat cards ===== */
.dash-stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:13px}
.t4-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-bottom:16px}
.st{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:6px;letter-spacing:.3px}
.st-win{background:var(--green-soft);color:var(--green)}
.st-loss{background:var(--red-soft);color:var(--red)}
.st-be{background:var(--surface-3);color:var(--text-2)}
.scale-bar{position:relative;width:84px;height:8px;background:var(--surface-3);border-radius:4px}
.scale-mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--text-3);opacity:.45}
.scale-fill{position:absolute;top:0;bottom:0;border-radius:3px;min-width:2px}
.scale-fill.pos{left:50%;background:var(--green)}
.scale-fill.neg{right:50%;background:var(--red)}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px;box-shadow:var(--shadow);transition:.18s;display:flex;flex-direction:column;min-height:138px}
.scard:hover{box-shadow:var(--shadow-h);transform:translateY(-2px)}
.sc-top{font-size:12.5px;color:var(--text-2);font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sc-info{font-size:10px;color:var(--text-3);font-weight:600}
.sc-badge{background:var(--surface-3);color:var(--text-2);font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;line-height:1.5}
.sc-big{font-size:24px;font-weight:800;letter-spacing:-1px;margin:9px 0 12px;line-height:1}
.sc-unit{font-size:15px;font-weight:700;color:var(--text-3)}
.sc-mini{margin-top:auto}
.wl-bar{display:flex;height:9px;border-radius:6px;overflow:hidden;gap:2px}
.wl-win{background:var(--green);border-radius:6px 2px 2px 6px}
.wl-loss{background:var(--red);border-radius:2px 6px 6px 2px}
.wl-be{background:var(--blue);border-radius:2px}
.wl-cap{display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-top:7px}
.awl{display:flex;flex-direction:column;gap:6px}
.awl-row{display:flex;align-items:center;gap:7px}
.awl-l{font-size:10.5px;font-weight:700;width:26px;flex:none}
.awl-track{flex:1;height:7px;background:var(--surface-2);border-radius:5px;overflow:hidden}
.awl-fill{height:100%;border-radius:5px}
.awl-fill.pos{background:var(--green)}
.awl-fill.neg{background:var(--red)}
.awl-v{font-size:11px;font-weight:700;width:46px;text-align:right;flex:none}

/* ===== Zella / score ===== */
.sc-gauge-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 0 0}
.sc-gauge-row .sc-big{margin:0}
.sc-gauge{display:flex;flex-direction:column;align-items:center;gap:3px;flex:none}
.gauge-legend{display:flex;gap:9px;font-size:11px;font-weight:800}
.gauge-legend .pos{color:var(--green)}.gauge-legend .neg{color:var(--red)}.gauge-legend .bl{color:var(--blue)}
.heatmap{display:flex;gap:7px;align-items:flex-start;margin-top:6px}
.hm-days{display:flex;flex-direction:column;gap:3px}
.hm-days span{height:13px;line-height:13px;font-size:9.5px;color:var(--text-3);font-weight:600;text-align:right}
.hm-grid{display:flex;gap:3px;flex-wrap:nowrap}
.hm-col{display:flex;flex-direction:column;gap:3px}
.hm-cell{width:13px;height:13px;border-radius:3px;background:var(--surface-3)}
.hm-cell.be{background:var(--blue-soft)}
.hm-legend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:14px;font-size:10.5px;color:var(--text-3);font-weight:600}
.hm-sw{width:12px;height:12px;border-radius:3px}
.dash-grid-mid{display:grid;grid-template-columns:minmax(280px,1fr) minmax(248px,.82fr) minmax(0,1.4fr);gap:16px;margin-top:16px}
.dash-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.zella-head{display:flex;align-items:center;gap:16px}
.zh-info{display:flex;flex-direction:column;gap:5px}
.zh-rate{font-size:11.5px;font-weight:800;padding:3px 12px;border-radius:20px;align-self:flex-start;letter-spacing:.8px}
.zh-score{font-size:38px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.grad-bar{height:9px;border-radius:6px;background:linear-gradient(90deg,#ef4d63,#f5862a,#f7d65a,#7bd88f,#16b97f);position:relative;margin:16px 2px 7px}
.grad-marker{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;background:#fff;border:3px solid var(--surface);transform:translate(-50%,-50%);box-shadow:0 2px 8px var(--marker-shadow)}
.grad-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);font-weight:700;padding:0 2px}
.zella-radar{display:flex;justify-content:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}

/* ===== Badges ===== */
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:4px;letter-spacing:.2px}
.badge.long{background:var(--green-soft);color:var(--green)}
.badge.short{background:var(--red-soft);color:var(--red)}
.pill{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--surface-2);color:var(--text-2);font-weight:600}

/* ===== Recent / table ===== */
.rt-item{display:flex;align-items:center;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--border-soft)}
.rt-item:last-child{border-bottom:none}
.rt-l{display:flex;align-items:center;gap:10px}
.rt-sym{font-weight:700;font-size:14px}
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;min-width:820px}
thead th{font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text-3);text-align:left;padding:13px 16px;background:var(--surface-2);border-bottom:1px solid var(--border);white-space:nowrap}
thead th.r,tbody td.r{text-align:right}
tbody td{padding:13px 16px;border-bottom:1px solid var(--border-soft);font-size:13.5px;white-space:nowrap}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
.sym{font-weight:700;font-size:13.5px}
.row-act{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;display:grid;place-items:center;transition:.14s}
.icon-btn svg{width:15px;height:15px}
.icon-btn:hover{background:var(--surface-2);color:var(--text)}
.icon-btn.danger:hover{color:var(--red);border-color:var(--red)}
.note-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;color:var(--text-2);font-size:12.5px}
.filter-bar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:14px}
.filter-bar input,.filter-bar select{font-family:var(--sans);background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text);font-size:13px;font-weight:500;transition:.14s;cursor:pointer}
.filter-bar input{min-width:170px;cursor:text}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.filter-bar .ff-clear{cursor:pointer;color:var(--text-2);font-size:12.5px;font-weight:700;background:none;border:none;font-family:inherit;padding:8px 6px}
.filter-bar .ff-clear:hover{color:var(--primary)}
.filter-bar .ff-count{font-size:12px;color:var(--text-3);font-weight:600;margin-left:auto;white-space:nowrap}
.pb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.pb-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.pb-name{font-size:16px;font-weight:800;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.pb-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);border:1px dashed var(--border);border-radius:6px;padding:2px 7px}
.pb-acts{display:flex;gap:6px;flex:none}
.pb-stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-top:15px}
.pb-chip{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px;padding:9px 11px}
.pb-chip .l{font-size:10px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.pb-chip .v{font-size:15px;font-weight:800;letter-spacing:-.3px}
.pb-rules{margin-top:14px;font-size:13px;line-height:1.6;color:var(--text-2);white-space:pre-wrap;word-break:break-word}
.pb-check{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.pb-check .ci{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-2)}
.pb-check .ci svg{width:15px;height:15px;flex:none;color:var(--green)}
@media(max-width:760px){.pb-stats{grid-template-columns:repeat(3,1fr)}}

/* ===== Charts ===== */
.chart-box{position:relative;width:100%}
.chart-yax{position:absolute;inset:0;pointer-events:none}
.cy-lab{position:absolute;left:8px;transform:translateY(-100%);font-size:11px;font-weight:600;color:var(--text-3);line-height:1.1;white-space:nowrap;text-shadow:0 0 3px var(--surface),0 0 2px var(--surface),0 0 2px var(--surface)}
.chart-box svg{width:100%;display:block}
.eq-tooltip{position:absolute;pointer-events:none;background:var(--tooltip-bg);border:1px solid var(--border);color:var(--tooltip-fg);border-radius:9px;padding:8px 11px;font-size:12px;transform:translate(-50%,-118%);white-space:nowrap;box-shadow:0 8px 24px var(--marker-shadow);opacity:0;transition:opacity .12s;z-index:5}
.eq-tooltip .d{font-size:10.5px;opacity:.7;margin-bottom:2px}
.eq-tooltip .v{font-weight:800;font-size:13px}
.eq-tooltip .v.pos{color:#5ff0bf}.eq-tooltip .v.neg{color:#ff8b9c}
.eq-guide{position:absolute;top:0;bottom:24px;width:1px;background:var(--guide);opacity:0;pointer-events:none}
.eq-marker{position:absolute;width:11px;height:11px;border-radius:50%;border:2px solid var(--surface);transform:translate(-50%,-50%);opacity:0;pointer-events:none;box-shadow:0 0 0 4px var(--primary-soft-2)}

/* ===== Bars (analytics) ===== */
.bar-row{display:flex;align-items:center;gap:12px;padding:9px 0}
.bar-row .bl{width:90px;font-size:12.5px;color:var(--text-2);font-weight:600;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:24px;background:var(--surface-2);border-radius:7px;position:relative;overflow:hidden}
.bar-fill{position:absolute;top:0;bottom:0;border-radius:7px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.bar-fill.pos{background:var(--green);left:0}
.bar-fill.neg{background:var(--red);right:0}
.bar-row .bv{width:86px;text-align:right;font-size:12.5px;font-weight:700;flex:none}
.bar-row .bc{width:38px;text-align:right;font-size:11px;color:var(--text-3);font-weight:600;flex:none}

/* ===== Calendar ===== */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.cal-nav{display:flex;align-items:center;gap:9px}
.cal-month{font-size:17px;font-weight:800;min-width:130px;text-align:center;letter-spacing:-.3px}
.cal-summary{display:flex;gap:22px;flex-wrap:wrap}
.cal-summary .cs{text-align:right}
.cal-summary .cs .l{font-size:11px;color:var(--text-3);font-weight:600}
.cal-summary .cs .v{font-size:17px;font-weight:800;margin-top:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr) .72fr;gap:7px}
.cal-dow{font-size:11px;color:var(--text-3);font-weight:700;text-align:center;padding:3px 0;letter-spacing:.5px}
.cal-cell{aspect-ratio:1/.82;border:1px solid var(--border);border-radius:10px;padding:8px 9px;position:relative;overflow:hidden;background:var(--surface);transition:.14s;display:flex;flex-direction:column}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell.has{cursor:pointer}
.cal-cell.has:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);z-index:2}
.cc-day{position:absolute;top:7px;right:9px;font-size:11px;color:var(--text-3);font-weight:700}
.cal-cell.win{background:var(--cal-win-bg);border-color:var(--cal-win-bd)}
.cal-cell.loss{background:var(--cal-loss-bg);border-color:var(--cal-loss-bd)}
.cal-cell.be{background:var(--cal-be-bg);border-color:var(--cal-be-bd)}
.cc-amt{font-size:14.5px;font-weight:800;letter-spacing:-.4px;margin-top:15px}
.cal-cell.win .cc-amt{color:var(--green)}
.cal-cell.loss .cc-amt{color:var(--red)}
.cal-cell.be .cc-amt{color:var(--text-2)}
.cc-meta{font-size:10.5px;color:var(--text-3);font-weight:600;line-height:1.35}
.cc-note{position:absolute;bottom:6px;left:8px;color:var(--text-3);opacity:.85}
.cc-note svg{width:12px;height:12px;display:block}
.cal-cell.today{box-shadow:0 0 0 2px var(--primary);border-color:var(--primary)}
.cal-cell.today .cc-day{color:var(--primary)}
.cal-week{border-radius:10px;border:1px solid var(--border);padding:8px;display:flex;flex-direction:column;justify-content:center;gap:2px;background:var(--surface-2)}
.cal-week .wl{font-size:9.5px;color:var(--text-3);font-weight:700;letter-spacing:.3px}
.cal-week .wv{font-size:13px;font-weight:800}
.cal-week .wc{font-size:9.5px;color:var(--text-3);font-weight:600}

/* ===== Empty ===== */
.empty-state{text-align:center;padding:64px 24px;border:1.5px dashed var(--border);border-radius:18px;background:var(--surface)}
.empty-state .ei{width:64px;height:64px;border-radius:18px;background:var(--primary-soft);display:grid;place-items:center;margin:0 auto 18px}
.empty-state .ei svg{width:30px;height:30px;color:var(--primary)}
.empty-state h3{font-size:18px;font-weight:800;margin-bottom:7px}
.empty-state p{color:var(--text-2);font-size:13.5px;max-width:380px;margin:0 auto 22px;line-height:1.6;font-weight:500}
.empty-state .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.mini-empty{color:var(--text-3);font-size:13px;padding:24px 0;text-align:center;font-weight:500}
.j-head{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;border-bottom:1px solid var(--border);background:var(--surface-2);gap:12px;flex-wrap:wrap}
.j-note-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-2);font-family:var(--sans);font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap}
.j-note-btn:hover{color:var(--primary);border-color:var(--primary)}
.j-note-btn svg{width:14px;height:14px;flex:none}
.note-day{font-size:13px;margin-bottom:12px}
.note-recap{margin-bottom:14px}
.note-recap .j-body{padding:0;gap:18px;align-items:center}
.rt-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:2px;padding:7px 8px;border:1px solid var(--border);border-bottom:none;border-radius:11px 11px 0 0;background:var(--surface-2)}
.rt-btn{min-width:30px;height:30px;padding:0 7px;border:none;background:transparent;color:var(--text-2);border-radius:7px;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.rt-btn:hover{background:var(--surface-3);color:var(--text)}
.rt-btn svg{width:15px;height:15px}
.rt-tpl{font-size:12px;color:var(--primary);font-weight:800;padding:0 11px}
.rt-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.rt-color span{width:15px;height:15px;border-radius:4px;display:block;border:1px solid var(--border)}
.rt-editor{min-height:200px;max-height:42vh;overflow-y:auto;border:1px solid var(--border);border-radius:0 0 11px 11px;padding:13px 15px;font-size:14px;line-height:1.7;color:var(--text);background:var(--surface);outline:none}
.rt-editor:empty:before{content:attr(data-ph);color:var(--text-3)}
.rt-editor:focus{border-color:var(--primary)}
.rt-editor h3{font-size:15px;font-weight:800;margin:11px 0 5px}
.rt-editor ul,.rt-editor ol{padding-left:22px;margin:6px 0}
.rt-editor a{color:var(--primary)}
.note-html{font-size:13px;line-height:1.65;color:var(--text);word-break:break-word}
.note-html h3{font-size:13.5px;font-weight:800;margin:9px 0 4px}
.note-html ul,.note-html ol{padding-left:20px;margin:5px 0}
.note-html a{color:var(--primary)}
.j-body{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.18fr);gap:24px;align-items:center;padding:16px 22px}
.day-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px 18px}
.ds-item{min-width:0}
.ds-lab{font-size:11.5px;color:var(--text-3);font-weight:600;margin-bottom:4px;white-space:nowrap}
.ds-val{font-size:16px;font-weight:800;letter-spacing:-.3px}
.ds-val.pos{color:var(--green)}.ds-val.neg{color:var(--red)}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:40px 18px;z-index:50;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:560px;box-shadow:var(--modal-shadow);animation:pop .22s cubic-bezier(.2,.9,.3,1.1)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-h h3{font-size:17px;font-weight:800}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface-2);border-radius:0 0 18px 18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.field{display:flex;flex-direction:column;gap:7px}
.field.full{grid-column:span 2}
.field label{font-size:12px;color:var(--text-2);font-weight:700}
.field input,.field select,.field textarea{font-family:var(--sans);background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;transition:.14s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.field textarea{resize:vertical;min-height:64px}
.seg{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:3px}
.seg button{flex:1;border:none;background:transparent;color:var(--text-2);font-family:var(--sans);font-weight:700;font-size:13px;padding:8px;border-radius:7px;cursor:pointer;transition:.14s}
.seg button.act-long{background:var(--green-soft);color:var(--green)}
.seg button.act-short{background:var(--red-soft);color:var(--red)}
.pnl-preview{grid-column:span 2;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between}
.pnl-preview .l{font-size:12.5px;color:var(--text-2);font-weight:600}
.pnl-preview .v{font-size:20px;font-weight:800}
.modal-x{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;display:grid;place-items:center}
.modal-x:hover{background:var(--surface-2);color:var(--text)}
.day-list{display:flex;flex-direction:column;gap:9px;max-height:46vh;overflow-y:auto}
.day-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px}
.day-item .di-l{display:flex;align-items:center;gap:11px;min-width:0}
.day-item .di-sym{font-weight:700;font-size:14px}
.day-item .di-meta{font-size:11.5px;color:var(--text-3);font-weight:500;margin-top:2px}
.day-item .di-pnl{font-weight:800;font-size:15px;white-space:nowrap}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--toast-bg);color:var(--toast-fg);padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:700;box-shadow:var(--modal-shadow);opacity:0;transition:.25s;z-index:99;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fade{opacity:0;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== Responsive ===== */
@media(max-width:1240px){.dash-grid-mid{grid-template-columns:1fr}}
@media(max-width:1080px){.dash-stats{grid-template-columns:repeat(3,1fr)}.dash-grid-mid{grid-template-columns:1fr}.t4-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){
  #app{grid-template-columns:1fr}
  .rail{display:none}
  .sidebar{position:sticky;top:0;height:auto;flex-direction:row;align-items:center;gap:4px;padding:11px;overflow-x:auto;border-right:none;border-bottom:1px solid var(--border);z-index:30}
  .brand{padding:0 12px 0 4px;flex:none}.brand .sub{display:none}
  .side-add{width:auto;margin:0;flex:none;padding:9px 11px;order:-1}.side-add span{display:none}
  .nav-label{display:none}
  .nav-item{flex:none;padding:9px 12px}.nav-item span{display:none}
  .sidebar .spacer{display:none}
  .side-action{flex:none;padding:9px}.side-action span{display:none}
  .dash-grid-2{grid-template-columns:1fr}
  .main{padding:16px 14px 50px}
  .cal-grid{grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-week{display:none}.cal-cell{padding:5px 6px;border-radius:8px}.cal-cell .cc-amt{font-size:11px;margin-top:12px}.cc-day{top:4px;right:5px;font-size:10px}.cc-meta{font-size:9px}
}
@media(max-width:680px){.dash-stats{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.j-body{grid-template-columns:1fr;gap:14px}.day-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}.field.full,.pnl-preview{grid-column:span 1}.page-title{font-size:21px}}
</style>
</head>

function calcPnl(t){const e=+t.entry,x=+t.exit,q=+t.qty,f=+t.fees||0;const g=t.side==='long'?(x-e)*q:(e-x)*q;return g-f;}
function calcPct(t){const e=+t.entry,x=+t.exit;if(!e)return 0;return t.side==='long'?(x-e)/e*100:(e-x)/e*100;}

function fmtDateFull(s){const d=parseDate(s);return L.dateFull(d.getFullYear(),d.getMonth(),d.getDate(),d.getDay());}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* Metrics */
function metrics(trades){
  const ts=trades.map(t=>({...t,pnl:calcPnl(t)}));
  const wins=ts.filter(t=>t.pnl>0),losses=ts.filter(t=>t.pnl<0);
  const net=sum(ts.map(t=>t.pnl)),gp=sum(wins.map(t=>t.pnl)),gl=Math.abs(sum(losses.map(t=>t.pnl)));
  const n=ts.length,decided=wins.length+losses.length;
  const winRate=decided?wins.length/decided*100:0;
  const pf=gl>0?gp/gl:(gp>0?Infinity:0);
  const avgWin=wins.length?gp/wins.length:0,avgLoss=losses.length?gl/losses.length:0;
  const wlRatio=avgLoss>0?avgWin/avgLoss:(avgWin>0?Infinity:0);
  const expectancy=n?net/n:0;
  const largestWin=wins.length?Math.max(...wins.map(t=>t.pnl)):0,largestLoss=losses.length?Math.min(...losses.map(t=>t.pnl)):0;
  const ordered=[...ts].sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  let mW=0,mL=0,cW=0,cL=0;ordered.forEach(t=>{if(t.pnl>0){cW++;cL=0;mW=Math.max(mW,cW);}else if(t.pnl<0){cL++;cW=0;mL=Math.max(mL,cL);}else{cW=0;cL=0;}});
  return{ts,wins,losses,net,gp,gl,n,winRate,pf,avgWin,avgLoss,wlRatio,expectancy,largestWin,largestLoss,maxWin:mW,maxLoss:mL,decided};
}
function equityPoints(trades){const ts=trades.map(t=>({...t,pnl:calcPnl(t)})).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);let cum=0;const pts=[{date:null,equity:0}];ts.forEach(t=>{cum+=t.pnl;pts.push({date:t.date,equity:cum,sym:t.symbol,pnl:t.pnl});});return pts;}
function dailyPnl(trades){const m={};trades.forEach(t=>{m[t.date]=(m[t.date]||0)+calcPnl(t);});return m;}
function maxDrawdown(pts){let peak=-Infinity,mdd=0;pts.forEach(p=>{if(p.equity>peak)peak=p.equity;mdd=Math.max(mdd,peak-p.equity);});return mdd;}
function parseDT(s){if(!s)return null;const d=new Date(String(s).replace(' ','T'));return isNaN(d.getTime())?null:d;}
function holdMinutes(t){const a=parseDT(t.entryTime),b=parseDT(t.exitTime);if(!a||!b)return null;const m=(b-a)/60000;return m>=0?m:null;}
function avgHold(trades){const xs=trades.map(holdMinutes).filter(v=>v!=null);return xs.length?sum(xs)/xs.length:null;}
function fmtDur(min){if(min==null||!isFinite(min))return '—';min=Math.round(min);if(min<60)return state.lang==='zh'?min+' 分':min+'m';const h=Math.floor(min/60),m=min%60;return state.lang==='zh'?(h+' 時'+(m?' '+m+' 分':'')):(h+'h'+(m?' '+m+'m':''));}
function calcR(t){if(t.stop==null||t.stop===''||!isFinite(+t.stop))return null;const risk=Math.abs(t.entry-(+t.stop))*t.qty;if(!(risk>0))return null;return calcPnl(t)/risk;}
function avgR(trades){const xs=trades.map(calcR).filter(v=>v!=null);return xs.length?sum(xs)/xs.length:null;}

    const bar=winLossBar(s.wins,s.losses);
    const rules=pb&&pb.rules?`<div class="pb-rules">${escapeHtml(pb.rules)}</div>`:'';
    const check=pb&&pb.checklist&&pb.checklist.length?`<div class="pb-check">${pb.checklist.map(c=>`<div class="ci"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>${escapeHtml(c)}</div>`).join('')}</div>`:'';
    return `<div class="pb-card"><div class="pb-top"><div class="pb-name">${escapeHtml(name)}${tag}</div>${acts}</div><div style="margin-top:12px">${bar}</div><div class="pb-stats">${stats}</div>${rules}${check}</div>`;
  }).join('')+'</div>';
  return html;
}
function computeScore(trades){
  const m=metrics(trades),pts=equityPoints(trades),mdd=maxDrawdown(pts);
  const rf=mdd>0?m.net/mdd:(m.net>0?4:0);
  const daily=dailyPnl(trades),posDays=Object.values(daily).filter(v=>v>0);
  const sumPos=sum(posDays),maxDay=posDays.length?Math.max(...posDays):0;
  const concentration=sumPos>0?maxDay/sumPos:1;
  const consScore=clamp((1-concentration)*1.25,0,1)*100;
  const winRateScore=clamp((m.winRate-20)/(75-20)*100,0,100);
  const pfv=isFinite(m.pf)?m.pf:3.5,pfScore=clamp((pfv-0.75)/(3-0.75)*100,0,100);
  const wlv=isFinite(m.wlRatio)?m.wlRatio:3.5,wlScore=clamp((wlv-0.5)/(3-0.5)*100,0,100);
  const ddScore=clamp(100*(1-mdd/(m.gp||1)),0,100);
  const rfScore=clamp(rf/4*100,0,100);
  const parts=[{label:L.rWin,score:winRateScore},{label:L.rPF,score:pfScore},{label:L.rWL,score:wlScore},{label:L.rDD,score:ddScore},{label:L.rRF,score:rfScore},{label:L.rCons,score:consScore}];
  const overall=sum(parts.map(p=>p.score))/parts.length;
  return{overall,parts,mdd,rf};
}

function evalRule(r,date){const dt=dayTradesOf(date);

function tradingDatesAsc(){return [...new Set(state.trades.map(t=>t.date).filter(Boolean))].sort();}

function dayScoreAuto(date){const ar=autoRules();let f=0,tot=0;ar.forEach(r=>{const e=evalRule(r,date);if(!e.applicable)return;tot++;if(e.followed)f++;});return tot?f/tot:null;}

function dayStatsGrid(ts){

function calendarBlock(){

}
function calGrid(y,mo,dayMap,maxAbs){
  const first=new Date(y,mo,1).getDay(),daysInMonth=new Date(y,mo+1,0).getDate(),isThis=(today.getFullYear()===y&&today.getMonth()===mo);
  let cells='';L.dow.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);cells+=`<div class="cal-dow">${L.weekly}</div>`;
  let day=1;const rows=Math.ceil((first+daysInMonth)/7);

    for(let c=0;c<7;c++){const ci=r*7+c;
      if(ci<first||day>daysInMonth){cells+=`<div class="cal-cell empty"></div>`;}
      else{const info=dayMap[day],isToday=isThis&&day===today.getDate();
        if(info){weekPnl+=info.pnl;weekN+=info.n;weekW+=info.w;const wr=info.n?info.w/info.n*100:0;const cls=info.pnl>0?'win':info.pnl<0?'loss':'be';cells+=`<div class="cal-cell has ${cls} ${isToday?'today':''}" data-action="day" data-day="${day}"><span class="cc-day">${day}</span><div class="cc-amt">${moneyShort(info.pnl)}</div><div class="cc-meta">${L.nTrades(info.n)}</div><div class="cc-meta">${wr.toFixed(1)}%</div>${info.note?'<span class="cc-note"><svg viewBox="0 0 24 24" fill="none"><path d="M5 4h11l3 3v13H5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M8 11h7M8 15h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>':''}</div>`;}
        else{cells+=`<div class="cal-cell ${isToday?'today':''}"><span class="cc-day">${day}</span></div>`;}
        day++;}}
    if(weekN>0)cells+=`<div class="cal-week"><div class="wl">${L.weekN(r+1)}</div><div class="wv ${weekPnl>=0?'pos':'neg'}">${moneyShort(weekPnl)}</div><div class="wc">${L.nTrades(weekN)} · ${(weekW/weekN*100).toFixed(0)}%</div></div>`;
    else cells+=`<div class="cal-week" style="opacity:.4"><div class="wl">${L.weekN(r+1)}</div><div class="wv" style="color:var(--text-3)">—</div></div>`;}
  return`<div class="cal-grid">${cells}</div>`;
}

function parseCSVLine(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(q){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){out.push(cur);cur='';}else cur+=c;}}out.push(cur);return out;}
function parseTVCSV(text){

  const find=(...alts)=>head.findIndex(h=>alts.some(a=>a instanceof RegExp?a.test(h):h.replace(/\s/g,'')===a));

    const status=iStat>=0?String(c[iStat]||''):'';
    if(iStat>=0&&(!/成交|fill/i.test(status)||/取消|cancel/i.test(status)))continue;
    const fill=parseFloat(String(c[iFill]||'').replace(/[^0-9.\-]/g,''));if(!isFinite(fill))continue;
    const qty=Math.abs(parseFloat(String(c[iQty]||'').replace(/[^0-9.\-]/g,'')));if(!isFinite(qty)||qty<=0)continue;

      if(pos===0){ep=start(q>0?'long':'short');ep.eQ+=Math.abs(q);ep.eN+=p*Math.abs(q);ep.et=f.t;ep.fee+=f.fee;pos=q;}

      else{const closeQ=Math.min(Math.abs(q),Math.abs(pos));ep.xQ+=closeQ;ep.xN+=p*closeQ;ep.xt=f.t;ep.fee+=f.fee;const np=pos+q;
        if(np!==0&&Math.sign(np)!==Math.sign(pos)){emit();const rem=Math.abs(np);ep=start(np>0?'long':'short');ep.eQ+=rem;ep.eN+=p*rem;ep.et=f.t;pos=np;}
        else{pos=np;if(pos===0)emit();}}
    });
    if(pos!==0)openCount++;
  });
  return {trades,openCount};
}
async function importCSVText(text){
  let fills;try{fills=parseTVCSV(text);}catch(e){fills=[];}
  if(!fills||!fills.length){toast(L.impNone);return;}
  const res=buildTradesFromFills(fills);const made=res.trades;
  if(!made.length){toast(L.impNone);return;}
  const keyOf=t=>`${t.symbol}|${t.date}|${t.side}|${(+t.entry).toFixed(3)}|${(+t.exit).toFixed(3)}|${t.qty}`;
  const idx={};state.trades.forEach(x=>{idx[keyOf(x)]=x;});
  let added=0,dup=0;
  made.forEach(t=>{const k=keyOf(t);const ex=idx[k];if(ex){dup++;if(!ex.entryTime&&t.entryTime)ex.entryTime=t.entryTime;if(!ex.exitTime&&t.exitTime)ex.exitTime=t.exitTime;}else{const nt={id:uid(),...t};state.trades.push(nt);idx[k]=nt;added++;}});
  setSeeded();await saveTrades();render();showImportSummary({fills:fills.length,paired:made.length,added,dup,open:res.openCount});
}

  if(u&&u.name){state.user=u;showApp();}else{state.user=null;showLogin();initLoginButton();}}

(async function(){const lg=await store.get('tz_lang');if(lg==='en'||lg==='zh')state.lang=lg;const th=await store.get('tz_theme');state.theme=th==='dark'?'dark':'light';applyTheme();setLang();state.trades=await loadTrades();state.dayNotes=await loadDayNotes();state.playbooks=await loadPlaybooks();state.notebookDoc=(await store.get(NOTEBOOK_KEY))||'';
try{const nn=await store.get(NOTES_KEY);state.notebook=nn?JSON.parse(nn):[];}catch(e){state.notebook=[];}
try{const nf=await store.get(NBFOLDERS_KEY);state.nbFolders=nf?JSON.parse(nf):[];}catch(e){state.nbFolders=[];}
if(!state.nbFolders.length){state.nbFolders=(state.lang==='en'?['Daily Journal','Trade Notes','Sessions Recap','My notes']:['每日日誌','交易筆記','盤後檢討','我的筆記']);await saveNbFolders();}
try{const rr=await store.get(RULES_KEY);state.rules=rr?JSON.parse(rr):[];}catch(e){state.rules=[];}
try{const rc=await store.get(RULECHECKS_KEY);state.ruleChecks=rc?JSON.parse(rc):{};}catch(e){state.ruleChecks={};}
if(!state.rules.length){const en=state.lang==='en';state.rules=[{id:uid(),name:en?'Stop loss on every trade':'每筆交易都設停損',type:'stoploss'},{id:uid(),name:en?'Tag a setup on every trade':'每筆交易都標記策略',type:'setup'},{id:uid(),name:en?'Max loss per day ≤ $100':'單日最大虧損 ≤ $100',type:'maxlossday',value:100},{id:uid(),name:en?'Max loss per trade ≤ $50':'單筆最大虧損 ≤ $50',type:'maxlosstrade',value:50},{id:uid(),name:en?'Max 5 trades per day':'每日最多 5 筆',type:'maxtrades',value:5},{id:uid(),name:en?'Review my plan before trading':'交易前複習計畫',type:'manual'}];await saveRules();}
if(!state.notebook.length&&state.notebookDoc&&state.notebookDoc.trim()){state.notebook=[{id:uid(),title:(state.lang==='en'?'My note':'我的筆記'),body:state.notebookDoc,folder:state.nbFolders[state.nbFolders.length-1]||'',created:Date.now(),updated:Date.now()}];await saveNotebookNotes();}
if(!(await store.get('tz_dnclean_v1'))){const marks=['Followed my plan and waited for clean setups','took one A+ setup and skipped the rest','照計畫走','盤勢震盪'];let ch=false;Object.keys(state.dayNotes).forEach(d=>{const v=String(state.dayNotes[d]||'');if(marks.some(m=>v.includes(m))){delete state.dayNotes[d];ch=true;}});if(ch)await saveDayNotes();await store.set('tz_dnclean_v1','1');}
let _lastToday=isoDate(new Date());setInterval(()=>{const t=isoDate(new Date());if(t===_lastToday)return;_lastToday=t;const ae=document.activeElement;if(ae&&(ae.isContentEditable||ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'))return;if(state.view==='notebook'&&state.nbFolder===(state.nbFolders[0]||''))state.nbSel='dn:'+t;render();},60000);
await setupAuth();render();})();
</script>
